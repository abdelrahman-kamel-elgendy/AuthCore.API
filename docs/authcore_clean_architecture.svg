        <rect x="20" y="564" width="640" height="168" rx="12" stroke-width="0.5" />
        <text class="th" x="36" y="588">API layer</text>
        <text class="ts" x="36" y="604">Controllers, Middleware, DI Extensions, Filters</text>
    </g>

    <g class="c-coral">
        <rect x="40" y="616" width="130" height="100" rx="6" stroke-width="0.5" />
        <text class="th" x="105" y="638" text-anchor="middle">Controllers</text>
        <text class="ts" x="105" y="654" text-anchor="middle">AuthController</text>
        <text class="ts" x="105" y="668" text-anchor="middle">UserController</text>
        <text class="ts" x="105" y="682" text-anchor="middle">TokenController</text>
        <text class="ts" x="105" y="696" text-anchor="middle">AdminController</text>
    </g>
    <g class="c-coral">
        <rect x="186" y="616" width="130" height="100" rx="6" stroke-width="0.5" />
        <text class="th" x="251" y="638" text-anchor="middle">Middleware</text>
        <text class="ts" x="251" y="654" text-anchor="middle">ExceptionMiddleware</text>
        <text class="ts" x="251" y="668" text-anchor="middle">RequestLogger</text>
        <text class="ts" x="251" y="682" text-anchor="middle">RateLimiter</text>
        <text class="ts" x="251" y="696" text-anchor="middle">CorrelationId</text>
    </g>
    <g class="c-coral">
        <rect x="332" y="616" width="130" height="100" rx="6" stroke-width="0.5" />
        <text class="th" x="397" y="638" text-anchor="middle">Extensions</text>
        <text class="ts" x="397" y="654" text-anchor="middle">ServiceExtensions</text>
        <text class="ts" x="397" y="668" text-anchor="middle">AuthExtensions</text>
        <text class="ts" x="397" y="682" text-anchor="middle">SwaggerExtensions</text>
        <text class="ts" x="397" y="696" text-anchor="middle">CorsExtensions</text>
    </g>
    <g class="c-coral">
        <rect x="478" y="616" width="162" height="100" rx="6" stroke-width="0.5" />
        <text class="th" x="559" y="638" text-anchor="middle">Cross-cutting</text>
        <text class="ts" x="559" y="654" text-anchor="middle">Filters / ApiResponse</text>
        <text class="ts" x="559" y="668" text-anchor="middle">HealthChecks</text>
        <text class="ts" x="559" y="682" text-anchor="middle">appsettings.json</text>
        <text class="ts" x="559" y="696" text-anchor="middle">Dockerfile</text>
    </g>

    <!-- ── Dependency arrows ── -->
    <line x1="340" y1="562" x2="340" y2="547" class="arr" />
    <line x1="340" y1="374" x2="340" y2="359" class="arr" />
    <line x1="340" y1="186" x2="340" y2="171" class="arr" />

    <text class="label" x="352" y="557">depends on</text>
    <text class="label" x="352" y="370">depends on</text>
    <text class="label" x="352" y="183">depends on</text>

    <!-- ── PostgreSQL ── -->
    <line x1="340" y1="544" x2="340" y2="750" stroke="#888780" stroke-width="0.5"
        stroke-dasharray="4 3" fill="none" />
    <line x1="340" y1="750" x2="340" y2="752" class="arr" />
    <text class="label" x="352" y="750">reads / writes</text>

    <g class="c-blue">
        <rect x="180" y="752" width="320" height="46" rx="8" stroke-width="0.5" />
        <text class="th" x="340" y="779" text-anchor="middle">PostgreSQL database</text>
    </g>

</svg>