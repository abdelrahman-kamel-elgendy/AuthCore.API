<svg width="70%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round" />
        </marker>
        <style>
            text { font-family: Arial, sans-serif; fill: #1a1a2e; }
            .th { font-size: 14px; font-weight: 600; }
            .ts { font-size: 12px; font-weight: 400; fill: #3a3a5c; }

            /* Purple - Domain */
            .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
            .c-purple .th { fill: #3C3489; }
            .c-purple .ts { fill: #534AB7; }

            /* Teal - Application */
            .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
            .c-teal .th { fill: #085041; }
            .c-teal .ts { fill: #0F6E56; }

            /* Amber - Infrastructure */
            .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
            .c-amber .th { fill: #633806; }
            .c-amber .ts { fill: #854F0B; }

            /* Coral - API */
            .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
            .c-coral .th { fill: #712B13; }
            .c-coral .ts { fill: #993C1D; }

            /* Blue - PostgreSQL */
            .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
            .c-blue .th { fill: #0C447C; }

            .arr { stroke: #888780; stroke-width: 1; fill: none; marker-end: url(#arrow); }
            .label { font-size: 11px; fill: #888780; }
        </style>
    </defs>

    <!-- ── Layer 1: Domain ── -->
    <g class="c-purple">
        <rect x="20" y="20" width="640" height="148" rx="12" stroke-width="0.5" />
        <text class="th" x="36" y="44">Domain layer</text>
        <text class="ts" x="36" y="60">No dependencies — pure C# entities and interfaces</text>
    </g>

    <g class="c-purple">
        <rect x="40" y="72" width="120" height="80" rx="6" stroke-width="0.5" />
        <text class="th" x="100" y="96" text-anchor="middle">Entities</text>
        <text class="ts" x="100" y="112" text-anchor="middle">User, Role</text>
        <text class="ts" x="100" y="126" text-anchor="middle">RefreshToken</text>
        <text class="ts" x="100" y="140" text-anchor="middle">PasswordReset</text>
    </g>
    <g class="c-purple">
        <rect x="176" y="72" width="120" height="80" rx="6" stroke-width="0.5" />
        <text class="th" x="236" y="96" text-anchor="middle">Interfaces</text>
        <text class="ts" x="236" y="112" text-anchor="middle">IUserRepository</text>
        <text class="ts" x="236" y="126" text-anchor="middle">ITokenRepository</text>
        <text class="ts" x="236" y="140" text-anchor="middle">IUnitOfWork</text>
    </g>
    <g class="c-purple">
        <rect x="312" y="72" width="120" height="80" rx="6" stroke-width="0.5" />
        <text class="th" x="372" y="96" text-anchor="middle">Enums &amp; consts</text>
        <text class="ts" x="372" y="112" text-anchor="middle">UserStatus</text>
        <text class="ts" x="372" y="126" text-anchor="middle">TokenType</text>
        <text class="ts" x="372" y="140" text-anchor="middle">ErrorCodes</text>
    </g>
    <g class="c-purple">
        <rect x="448" y="72" width="192" height="80" rx="6" stroke-width="0.5" />
        <text class="th" x="544" y="96" text-anchor="middle">Exceptions &amp; events</text>
        <text class="ts" x="544" y="112" text-anchor="middle">DomainException</text>
        <text class="ts" x="544" y="126" text-anchor="middle">UserRegisteredEvent</text>
        <text class="ts" x="544" y="140" text-anchor="middle">PasswordResetEvent</text>
    </g>

