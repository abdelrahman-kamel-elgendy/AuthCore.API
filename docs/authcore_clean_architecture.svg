        <text class="ts" x="559" y="466" text-anchor="middle">Hangfire setup</text>
        <text class="ts" x="559" y="480" text-anchor="middle">CleanExpiredTokens</text>
        <text class="ts" x="559" y="494" text-anchor="middle">SendEmailJob</text>
        <text class="ts" x="559" y="508" text-anchor="middle">AuditLogJob</text>
    </g>

    <!-- ── Layer 4: API ── -->
