        <text class="th" x="105" y="262" text-anchor="middle">Auth commands</text>
        <text class="ts" x="105" y="278" text-anchor="middle">RegisterCommand</text>
        <text class="ts" x="105" y="292" text-anchor="middle">LoginCommand</text>
        <text class="ts" x="105" y="306" text-anchor="middle">ForgotPassword</text>
        <text class="ts" x="105" y="320" text-anchor="middle">ResetPassword</text>
    </g>
