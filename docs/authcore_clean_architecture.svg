        <rect x="186" y="240" width="130" height="100" rx="6" stroke-width="0.5" />
        <text class="th" x="251" y="262" text-anchor="middle">User commands</text>
        <text class="ts" x="251" y="278" text-anchor="middle">UpdateProfile</text>
        <text class="ts" x="251" y="292" text-anchor="middle">ChangePassword</text>
        <text class="ts" x="251" y="306" text-anchor="middle">AssignRole</text>
        <text class="ts" x="251" y="320" text-anchor="middle">BanUser</text>
    </g>
    <g class="c-teal">
        <rect x="332" y="240" width="130" height="100" rx="6" stroke-width="0.5" />
        <text class="th" x="397" y="262" text-anchor="middle">Token commands</text>
        <text class="ts" x="397" y="278" text-anchor="middle">RefreshToken</text>
        <text class="ts" x="397" y="292" text-anchor="middle">RevokeToken</text>
        <text class="ts" x="397" y="306" text-anchor="middle">ValidateToken</text>
        <text class="ts" x="397" y="320" text-anchor="middle">RevokeAll</text>
    </g>
    <g class="c-teal">
        <rect x="478" y="240" width="162" height="100" rx="6" stroke-width="0.5" />
        <text class="th" x="559" y="262" text-anchor="middle">Queries &amp; DTOs</text>
        <text class="ts" x="559" y="278" text-anchor="middle">GetUserQuery</text>
        <text class="ts" x="559" y="292" text-anchor="middle">ListUsersQuery</text>
        <text class="ts" x="559" y="306" text-anchor="middle">UserResponse</text>
        <text class="ts" x="559" y="320" text-anchor="middle">TokenResponse</text>
    </g>

    <!-- ── Layer 3: Infrastructure ── -->
    <g class="c-amber">
        <rect x="20" y="376" width="640" height="168" rx="12" stroke-width="0.5" />
        <text class="th" x="36" y="400">Infrastructure layer</text>
        <text class="ts" x="36" y="416">EF Core + PostgreSQL, JWT, Email, Hangfire, external
            services</text>
    </g>

    <g class="c-amber">
        <rect x="40" y="428" width="130" height="100" rx="6" stroke-width="0.5" />
        <text class="th" x="105" y="450" text-anchor="middle">Persistence</text>
        <text class="ts" x="105" y="466" text-anchor="middle">AppDbContext</text>
        <text class="ts" x="105" y="480" text-anchor="middle">UserRepository</text>
        <text class="ts" x="105" y="494" text-anchor="middle">Migrations</text>
        <text class="ts" x="105" y="508" text-anchor="middle">Configurations</text>
    </g>
    <g class="c-amber">
        <rect x="186" y="428" width="130" height="100" rx="6" stroke-width="0.5" />
        <text class="th" x="251" y="450" text-anchor="middle">Auth services</text>
        <text class="ts" x="251" y="466" text-anchor="middle">JwtTokenService</text>
        <text class="ts" x="251" y="480" text-anchor="middle">PasswordHasher</text>
        <text class="ts" x="251" y="494" text-anchor="middle">RefreshTokenSvc</text>
        <text class="ts" x="251" y="508" text-anchor="middle">OtpService</text>
    </g>
    <g class="c-amber">
        <rect x="332" y="428" width="130" height="100" rx="6" stroke-width="0.5" />
        <text class="th" x="397" y="450" text-anchor="middle">Notification</text>
        <text class="ts" x="397" y="466" text-anchor="middle">EmailService</text>
        <text class="ts" x="397" y="480" text-anchor="middle">SmtpClient</text>
        <text class="ts" x="397" y="494" text-anchor="middle">TemplateRenderer</text>
        <text class="ts" x="397" y="508" text-anchor="middle">EmailTemplates</text>
    </g>
    <g class="c-amber">
        <rect x="478" y="428" width="162" height="100" rx="6" stroke-width="0.5" />
