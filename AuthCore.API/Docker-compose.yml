services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine        # alpine variant is smaller (~80MB vs ~400MB)
    container_name: authcore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       AuthCoreDB
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persists data across restarts
    ports:
      - "5432:5432"                  # expose to host for local DB tools (e.g. pgAdmin)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d AuthCoreDB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── AuthCore API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: authcore-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy    # wait until postgres passes its healthcheck
    ports:
      - "8080:8080"
    environment:
      # Database
      ConnectionStrings__PostgreSQL: "Host=postgres;Database=AuthCoreDB;Username=postgres;Password=${DB_PASSWORD}"

      # JWT
      JWT__ValidIssuer:              ${JWT_ISSUER}
      JWT__ValidAudience:            ${JWT_AUDIENCE}
      JWT__SecretKey:                ${JWT_SECRET_KEY}
      JWT__AccessTokenExpiryMinutes: ${JWT_ACCESS_EXPIRY_MINUTES:-60}
      JWT__RefreshTokenExpiryDays:   ${JWT_REFRESH_EXPIRY_DAYS:-7}

      # App
      App__BaseUrl:                  ${APP_BASE_URL}

      # SMTP
      Smtp__Host:                    ${SMTP_HOST}
      Smtp__Port:                    ${SMTP_PORT:-587}
      Smtp__Username:                ${SMTP_USERNAME}
      Smtp__Password:                ${SMTP_PASSWORD}
      Smtp__FromName:                ${SMTP_FROM_NAME:-AuthCore}
      Smtp__EnableSsl:               ${SMTP_ENABLE_SSL:-true}

      # Seed
      Seed__Admin__Email:            ${SEED_ADMIN_EMAIL}
      Seed__Admin__Password:         ${SEED_ADMIN_PASSWORD}
      Seed__Admin__FirstName:        ${SEED_ADMIN_FIRSTNAME}
      Seed__Admin__LastName:         ${SEED_ADMIN_LASTNAME}
      Seed__Admin__UserName:         ${SEED_ADMIN_USERNAME}

      # Runtime
      ASPNETCORE_ENVIRONMENT:        ${ASPNETCORE_ENVIRONMENT:-Production}

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s             # give the app time to run migrations on first boot

volumes:
  postgres_data:                    # named volume — survives container removal